<section id="content-settings" class="page-content">
    <h1 class="text-[#111318] dark:text-gray-100 tracking-light text-[32px] font-bold leading-tight text-left">Application Settings</h1>
    <p class="text-gray-500 dark:text-gray-400 mt-1 mb-8">Manage your account and customize app preferences.</p>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900/50 p-6">
            <h3 class="text-xl font-bold mb-4 dark:text-white border-b border-gray-200 dark:border-gray-700 pb-2">Profile & Security</h3>
            <form id="settings-form" class="space-y-4">
                <div>
                    <label for="doctor-name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Full Name</label>
                    <input type="text" id="doctor-name" value="Dr. Smith" class="mt-1 block w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-background-light dark:bg-gray-900/50 p-2 text-gray-900 dark:text-gray-100">
                </div>
                <div>
                    <label for="specialty" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Specialty</label>
                    <input type="text" id="specialty" value="Cardiologist" class="mt-1 block w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-background-light dark:bg-gray-900/50 p-2 text-gray-900 dark:text-gray-100">
                </div>
                <button type="submit" id="save-profile-btn" class="flex h-10 items-center justify-center rounded-md bg-primary px-4 text-white text-sm font-bold leading-normal tracking-wide shadow-sm hover:bg-primary/90">Save Profile</button>
                <div id="profile-feedback" class="text-sm font-semibold text-green-500 hidden"></div>
            </form>
        </div>

        
    </div>
</section>
