name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Web Assets
        run: |
          mkdir -p dist
          cp -r src/renderer/* dist/

      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev

      - name: Generate App Icons
        run: |
          # Install globally to prevent local module resolution errors
          npm install -g @capacitor/assets
          capacitor-assets generate --android

      - name: Capacitor Sync
        run: |
          # Install Capacitor globally in the runner for maximum permission stability
          npm install -g @capacitor/cli @capacitor/core
          cap sync android

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MedEcho-Mobile-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
