<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Checklist</title>
    <link href__="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;

        }
        
        .header {
            background: linear-gradient(135deg, #0891B2 0%, #059669 100%);
            color: white;
            padding: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .add-section {
            padding: 25px 30px;
            border-bottom: 2px solid #f1f5f9;
            display: flex;
            gap: 12px;
        }
        
        #new-item-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        
        #new-item-input:focus {
            outline: none;
            border-color: #0891B2;
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #0891B2 0%, #059669 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(8, 145, 178, 0.4);
        }
        
        .checklist-container {
            padding: 20px 30px 30px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .checklist-item:hover {
            background: #f1f5f9;
            border-color: #0891B2;
        }
        
        .checklist-item.done {
            opacity: 0.6;
        }
        
        .checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #059669;
        }
        
        .item-text {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            padding: 4px;
            border-radius: 4px;
        }
        
        .item-text:focus {
            outline: none;
            background: white;
            box-shadow: 0 0 0 2px #0891B2;
        }
        
        .done .item-text {
            text-decoration: line-through;
        }
        
        .delete-btn {
            padding: 8px 16px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .delete-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Patient Questions Checklist</h1>
            <p>Manage questions to ask during consultations</p>
        </div>
        
        <div class="add-section">
            <input 
                type="text" 
                id="new-item-input" 
                placeholder="Enter a new question to ask patients..."
                autocomplete="off"
            >
            <button class="btn btn-primary" id="add-item-btn">
                ➕ Add Question
            </button>
        </div>
        
        <div class="checklist-container" id="checklist-container">
            <div class="empty-state" id="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                </svg>
                <p>No questions added yet</p>
            </div>
        </div>
    </div>
    
    <script src="renderer/checklist-renderer.js"></script>
</body>
</html>
