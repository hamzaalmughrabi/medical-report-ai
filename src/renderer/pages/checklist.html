<section class="max-w-4xl mx-auto p-4 md:p-10 space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-700 pb-32">
    <!-- Premium Clinical Header -->
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 border-b border-slate-100 dark:border-slate-800 pb-8">
        <div class="space-y-2">
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-primary/5 rounded-full text-[10px] font-black text-primary uppercase tracking-widest border border-primary/10">
                <span class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></span>
                Clinical Protocol: Active
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 dark:text-white tracking-tighter"> <span data-i18n="consultation_checklist">Consultation Checklist</span> </h1>
            <p class="text-slate-500 font-medium max-w-xl"> <span data-i18n="checklist_desc">Standardized clinical questions and protocol markers to ensure comprehensive diagnostic data collection during sessions.</span> </p>
        </div>
    </div>

    <!-- Add Section -->
    <div class="bg-white dark:bg-slate-800 rounded-[2.5rem] p-8 border border-slate-100 dark:border-slate-800 shadow-sm flex flex-col md:flex-row gap-4">
        <input 
            type="text" 
            id="new-item-input" 
            data-i18n-placeholder="checklist_placeholder" placeholder="Document a new protocol question..."
            class="flex-1 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl px-6 py-4 text-sm font-medium focus:ring-2 focus:ring-primary focus:outline-none transition-all"
        >
        <button id="add-item-btn" class="px-8 py-4 bg-primary text-white rounded-2xl font-black shadow-xl shadow-primary/30 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3 whitespace-nowrap">
            <span class="material-symbols-outlined">add</span> <span data-i18n="append_question">Append Question</span>
        </button>
    </div>

    <!-- Checklist Container -->
    <div id="checklist-container" class="space-y-4 min-h-[400px]">
        <!-- Empty State -->
        <div id="empty-state" class="py-24 text-center space-y-6">
            <div class="w-24 h-24 bg-slate-50 dark:bg-slate-900 rounded-[2rem] flex items-center justify-center mx-auto text-slate-200">
                <span class="material-symbols-outlined text-6xl">clinical_notes</span>
            </div>
            <div class="space-y-2">
                <h3 class="text-xl font-bold text-slate-900 dark:text-white uppercase tracking-tight"> <span data-i18n="registry_empty">Registry Empty</span> </h3>
                <p class="text-sm text-slate-400 max-w-xs mx-auto"> <span data-i18n="registry_empty_desc">Your consultation protocol list is currently clear. Add standardized questions above.</span> </p>
            </div>
        </div>
    </div>
</section>
html>
