<section id="content-reports" class="page-content">
    <h1 class="text-[#111318] dark:text-gray-100 tracking-light text-[32px] font-bold leading-tight text-left">Patient Reports & Management</h1>
    <p class="text-gray-500 dark:text-gray-400 mt-1 mb-8">View, edit, and export patient reports. <span class="text-xs text-primary">Data is loaded in real-time from Firestore.</span></p>

    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6">
        <div class="relative flex-1 max-w-lg">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">search</span>
            <input class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900/50 py-2 pl-10 pr-4 text-gray-900 dark:text-gray-100 focus:border-primary focus:ring-primary focus:ring-2 focus:outline-none" placeholder="Search by name, ID, or report date..." type="search"/>
        </div>
        <button id="add-patient-btn" class="mt-4 sm:mt-0 flex h-10 items-center justify-center overflow-hidden rounded-md bg-primary px-4 text-white text-sm font-bold leading-normal tracking-wide shadow-sm hover:bg-primary/90">
            <span class="material-symbols-outlined mr-2">person_add</span> Add New Patient
        </button>
    </div>
    
    <div class="overflow-x-auto rounded-lg border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900/50">
        <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-800 text-sm">
            <thead class="bg-gray-50 dark:bg-white/5">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400" scope="col">Name / ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400" scope="col">Latest Report Date</th>
                    <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400" scope="col">Status</th>
                    <th class="relative px-6 py-3 text-center text-xs font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400" scope="col">Actions</th>
                </tr>
            </thead>
            <tbody id="reports-table-body" class="divide-y divide-gray-200 dark:divide-gray-800">
                <tr><td colspan="4" class="px-6 py-4 text-center text-gray-500 dark:text-gray-400">Loading reports...</td></tr>
            </tbody>
        </table>
    </div>
</section>
